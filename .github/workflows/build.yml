#
# Git Flow pipeline
#   CI : build + tests on every PR (feature -> develop, develop -> master)
#        and on pushes to the long-lived branches (develop, master)
#   CD : merge into develop  -> deploy to STAGING
#        merge into master   -> deploy to PRODUCTION
#
# Best practice: protect "develop" and "master" in GitHub branch settings
# (require PR + passing "build" check before merge).
#
name: CI/CD
on:
  # Branch analysis only on the long-lived branches (baseline / reference).
  push:
    branches: [ "master", "develop" ]
  # PR analysis on every PR, on open AND on update (new commits = "synchronize").
  # This is the gate: the quality gate is computed on the PR's new code before merge.
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel any in-progress run when a new commit is pushed to the same ref,
# so superseded PR/branch runs don't waste CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so SonarCloud can assign issues to authors / new code.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Real build/test failures must still fail the pipeline.
      - name: Build & test
        run: mvn -B verify --file pom.xml

      # Wait for the SonarCloud quality gate so its PASSED/FAILED result shows up
      # in the logs and the PR decoration, but DO NOT block the pipeline:
      # continue-on-error keeps the job green even if the gate is red.
      - name: SonarCloud analysis (quality gate, non-blocking)
        continue-on-error: true
        run: >
          mvn -B
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.7.0.6970:sonar
          -Dsonar.qualitygate.wait=true
          --file pom.xml
        env:
          SONAR_TOKEN: ${{ secrets.DEMO_SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        run: railway up --detach --service "demo-github-action-staging"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (production)
        run: railway up --detach --service "demo-github-action"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
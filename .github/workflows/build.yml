#
# Git Flow pipeline
#   CI : build + tests on every PR (feature -> develop, develop -> master)
#        and on pushes to the long-lived branches (develop, master)
#   CD : merge into develop  -> deploy to STAGING
#        merge into master   -> deploy to PRODUCTION
#
# Best practice: protect "develop" and "master" in GitHub branch settings
# (require PR + passing "build" check before merge).
#
name: CI/CD
on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
  workflow_dispatch:

# Cancel any in-progress run when a new commit is pushed to the same ref,
# so superseded PR/branch runs don't waste CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        run: railway up --detach --service "demo-github-action-staging"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (production)
        run: railway up --detach --service "demo-github-action"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}